# PortDoc corpus manifest — the reproducible, fingerprinted description of every doc.
#
# These files ship locally in corpus/raw/ (several official Moroccan sources block
# automated download). `sha256` guarantees integrity: `make fetch` recomputes each
# hash and HARD-FAILS on any mismatch. `url` (where present) is provenance + lets
# fetch re-download a missing file.
#
# clearance: omit to derive from doc_type; set explicitly for restricted material.
#   0 = public | 1 = internal | 2 = restricted  (powers the RBAC retrieval filter §6.5)

